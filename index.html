<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>职场精神状态扫描报告</title>
    <style>
        :root { 
            --neon-green: #39ff14; 
            --office-gray: #1e1e1e; 
            --warning-red: #ff3131; 
        }
        body { 
            background: #000; 
            color: #fff; 
            font-family: sans-serif; 
            margin: 0; 
            overflow-x: hidden; 
        }
        .container { 
            max-width: 500px; 
            margin: 0 auto; 
            padding: 20px; 
            text-align: center; 
        }
        .hidden { display: none !important; }
        
        .brand-poster { 
            width: 100%; 
            border: 1px solid var(--neon-green); 
            border-radius: 12px; 
            margin-bottom: 20px; 
            box-shadow: 0 0 20px rgba(57,255,20,0.3); 
        }

        .q-card { 
            background: rgba(30, 30, 30, 0.8); 
            backdrop-filter: blur(10px); 
            border: 1px solid var(--neon-green); 
            padding: 25px; 
            border-radius: 20px; 
            margin-top: 30px; 
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.2); 
            position: relative; 
        }
        .progress-container { 
            width: 100%; 
            height: 6px; 
            background: #333; 
            border-radius: 3px; 
            margin-bottom: 20px; 
            overflow: hidden; 
        }
        .progress-bar { 
            height: 100%; 
            background: var(--neon-green); 
            width: 0%; 
            box-shadow: 0 0 10px var(--neon-green); 
            transition: width 0.3s ease; 
        }
        .opt-btn { 
            display: block; 
            width: 100%; 
            padding: 15px; 
            margin: 12px 0; 
            background: rgba(255, 255, 255, 0.05); 
            color: #eee; 
            border: 1px solid rgba(57, 255, 20, 0.3); 
            border-radius: 12px; 
            text-align: left; 
            font-size: 15px; 
            transition: all 0.2s; 
            cursor: pointer; 
        }
        .opt-btn:active { 
            background: var(--neon-green); 
            color: #000; 
            transform: scale(0.98); 
        }
        
        .role-choice-group { 
            display: flex; 
            gap: 15px; 
            margin-top: 25px; 
        }
        .role-btn { 
            flex: 1; 
            padding: 18px; 
            border-radius: 12px; 
            font-weight: bold; 
            cursor: pointer; 
            border: 1px solid var(--neon-green); 
            transition: 0.3s; 
        }
        .btn-boss { 
            background: transparent; 
            color: var(--neon-green); 
        }
        .btn-cow { 
            background: var(--neon-green); 
            color: #000; 
            box-shadow: 0 0 15px var(--neon-green); 
        }

        .title { 
            font-size:28px; 
            color:var(--neon-green); 
            margin-top:10px; 
            text-shadow:0 0 10px var(--neon-green); 
        }
        .subtitle { 
            color:#aaa; 
            margin-top:10px; 
            font-size:14px; 
        }
        .scan-line { 
            width:80%; 
            height:2px; 
            background:var(--neon-green); 
            margin:20px auto; 
            animation:scan 2s infinite linear; 
        }
        @keyframes scan { 
            0% {transform:translateX(-50px); opacity:0;} 
            50% {opacity:1;} 
            100% {transform:translateX(50px); opacity:0;} 
        }
        
        .bg-neon { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh; 
            background: radial-gradient(circle at 20% 20%, rgba(57,255,20,0.15) 0%, transparent 40%), radial-gradient(circle at 80% 70%, rgba(255,49,49,0.1) 0%, transparent 40%); 
            animation: breathe 8s infinite alternate ease-in-out; 
            z-index: -1; 
        }
        @keyframes breathe { 
            0% { opacity: 0.3; } 
            100% { opacity: 0.8; } 
        }
        .floating-word { 
            position: absolute; 
            color: rgba(57,255,20,0.1); 
            font-size: 12px; 
            animation: float 6s infinite linear; 
            z-index: -1; 
        }
        @keyframes float { 
            0% { transform: translateY(10px); opacity: 0.2; } 
            100% { transform: translateY(-10px); opacity: 0.2; } 
        }
        
        #share-img { 
            width: 100%; 
            border-radius: 10px; 
            box-shadow: 0 0 20px rgba(255,255,255,0.1); 
            margin-top: 15px; 
        }
        .alert-bg { animation: alertFlash 0.5s infinite alternate; }
        @keyframes alertFlash { 
            from { background: rgba(255,49,49,0); } 
            to { background: rgba(255,49,49,0.2); } 
        }
        .start-btn { 
            width:100%; 
            padding:15px; 
            background:var(--neon-green); 
            color:#000; 
            border:none; 
            border-radius:10px; 
            font-size:16px; 
            font-weight:bold; 
            box-shadow:0 0 15px var(--neon-green); 
            cursor: pointer; 
        }
          .poster-container {
            width: 100%;
            padding: 10px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
          }
          .neo-holo-frame {
            width: 90%;
            max-width: 340px;
            aspect-ratio: 3/4;
            background: radial-gradient(circle at 30% 20%, #111 40%, #000);
            border: 1px solid #00ffcc;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 40px #00ffaa66;
            border-radius: 8px;
          }
          
          .scan-line-top,
          .scan-line-middle,
          .scan-line-bottom {
            position: absolute;
            width: 100%;
            height: 1px;
            background: #00ffaa;
            opacity: 0.8;
            z-index: 1;
            animation: scan-vertical 3s linear infinite;
          }
          .scan-line-middle { animation-delay: 1s; }
          .scan-line-bottom { animation-delay: 2s; }
          @keyframes scan-vertical {
            0% { top: 0; opacity: 0; }
            50% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
          }
          
          .hex-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
            width: 60px;
            height: 60px;
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
          }
          .h {
            background: #00ffaa;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            opacity: 0.1;
            animation: hex-pulse 2s ease-in-out infinite alternate;
          }
          .h1 { animation-delay: 0.1s; }
          .h2 { animation-delay: 0.3s; }
          .h3 { animation-delay: 0.5s; }
          .h4 { animation-delay: 0.7s; }
          .h5 { animation-delay: 0.9s; }
          .h6 { animation-delay: 1.1s; }
          @keyframes hex-pulse {
            0% { opacity: 0.1; }
            100% { opacity: 0.3; }
          }
          
          .text-group {
            position: absolute;
            top: 110px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: #fff;
            z-index: 2;
          }
          .main-title {
            font-size: 22px;
            font-weight: 900;
            color: #00ffaa;
            text-shadow: 0 0 10px #00ffaa;
            letter-spacing: 1px;
          }
          .sub-title {
            font-size: 12px;
            color: #00ffcc88;
            margin-top: 6px;
          }
          .badge-group {
            margin-top: 12px;
            display: flex;
            gap: 6px;
            justify-content: center;
          }
          .badge {
            background: #002211;
            color: #00ffaa;
            font-size: 10px;
            padding: 3px 6px;
            border-radius: 10px;
            border: 1px solid #00ffaa;
          }
          
          .orbit-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 1px solid #00ffaa;
            border-radius: 50%;
            opacity: 0.2;
            animation: orbit-rotate 10s linear infinite;
          }
          .orbit-1 { width: 180px; height: 180px; animation-duration: 10s; }
          .orbit-2 { width: 220px; height: 220px; animation-duration: 15s; }
          .orbit-3 { width: 260px; height: 260px; animation-duration: 20s; }
          @keyframes orbit-rotate {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
          }
          
          .data-float-lines {
            position: absolute;
            inset: 0;
          }
          .line {
            position: absolute;
            width: 1px;
            background: #00ffaa;
            opacity: 0.15;
            animation: data-float 4s linear infinite;
          }
          .l1 { left: 20%; height: 100%; animation-delay: 0s; }
          .l2 { left: 40%; height: 100%; animation-delay: 1s; }
          .l3 { left: 60%; height: 100%; animation-delay: 2s; }
          .l4 { left: 80%; height: 100%; animation-delay: 3s; }
          @keyframes data-float {
            0% { top: -100%; opacity: 0; }
            50% { opacity: 0.15; }
            100% { top: 100%; opacity: 0; }
          }
          
          .lock-frame {
            position: absolute;
            inset: 10px;
            border: 1px solid #00ffaa22;
          }
          .lock-top, .lock-bottom {
            position: absolute;
            width: 20px;
            height: 1px;
            background: #00ffaa;
          }
          .lock-left, .lock-right {
            position: absolute;
            width: 1px;
            height: 20px;
            background: #00ffaa;
          }
          .lock-top { top: 0; left: 0; }
          .lock-bottom { bottom: 0; right: 0; }
          .lock-left { top: 0; left: 0; }
          .lock-right { bottom: 0; right: 0; }
    #page-quiz .q-card {
      background: linear-gradient(180deg, #111 0%, #1a1a1a 100%);
      border: 1px solid rgba(57, 255, 20, 0.5);
      box-shadow: 0 0 30px rgba(57, 255, 20, 0.15), 0 0 60px rgba(57, 255, 20, 0.1);
      border-radius: 24px;
      padding: 30px 22px;
      position: relative;
      overflow: hidden;
    }
    #page-quiz .q-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg, #39ff14, #8eff73, #39ff14);
      animation: lightMove 2s linear infinite;
    }
    @keyframes lightMove {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }
    
    #page-quiz .opt-btn {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(57, 255, 20, 0.25);
      border-radius: 16px;
      padding: 18px 16px;
      transition: all 0.25s ease;
      position: relative;
    }
    #page-quiz .opt-btn:hover {
      background: rgba(57, 255, 20, 0.1);
      border-color: #39ff14;
      transform: translateX(6px);
    }
    #page-quiz .opt-btn:active {
      transform: scale(0.96);
    }
    
    #page-quiz .progress-container {
      background: #222;
      border-radius: 99px;
      height: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }
    #page-quiz .progress-bar {
      background: linear-gradient(90deg, #39ff14, #6eff50);
      box-shadow: 0 0 12px #39ff14;
      border-radius: 99px;
    }
    #page-quiz {
        background: linear-gradient(180deg, #0F0F11, #1A1A1F);
        background-image: linear-gradient(180deg, #0F0F11, #1A1A1F);
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-blend-mode: overlay;
        padding: 20px;
        min-height: 100vh;
    }

    #quiz-content {
        background: #18181B;
        border-radius: 22px;
        padding: 35px 28px;
        box-shadow: 
            0 30px 60px rgba(0,0,0,0.4),
            0 20px 40px rgba(0,0,0,0.3),
            inset 0 1px 1px rgba(255,255,255,0.12);
        border: 1px solid rgba(255,255,255,0.06);
        position: relative;
        overflow: hidden;
    }

    #quiz-content::before {
        content: "";
        position: absolute;
        top: 12px; left: 12px; right: 12px; bottom: 12px;
        border-radius: 12px;
        box-shadow: inset 0 0 20px rgba(0,0,0,0.3);
        pointer-events: none;
    }

    .opt-btn {
        background: linear-gradient(180deg, #222, #2D2D30);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 14px;
        padding: 20px 18px;
        box-shadow: 
            0 4px 10px rgba(0,0,0,0.25),
            inset 0 1px 1px rgba(255,255,255,0.04);
        transition: all 0.2s ease;
    }
    .opt-btn:active {
        background: linear-gradient(180deg, #111, #1A1A1F);
        box-shadow: 
            0 2px 5px rgba(0,0,0,0.3),
            inset 0 1px 2px rgba(0,0,0,0.4);
        transform: scale(0.97);
    }

    .progress-container {
        background: #111;
        border-radius: 99px;
        height: 10px;
        box-shadow: inset 0 2px 4px rgba(0,0,0,0.4);
    }
    .progress-bar {
        background: linear-gradient(90deg, #00FFAA, #00CCFF);
        border-radius: 99px;
        box-shadow: 0 0 10px #00FFAA;
    }
</style>
</head>
<body>

<audio id="bgm" loop ><source src="environment.mp3" type="audio/mpeg"></audio>

<div class="container">

                <div class="text-group">

            </div>
          </div>
          
          
        <h1 class="title">2026 职场精神状态扫描</h1>
        <div class="scan-line"></div>
        <p style="color: #aaa; font-size: 14px; line-height: 1.6;">本报告由 <strong>灵犀测评局</strong> 提供逻辑算法支持<br>请选择你的真实身份开启诊断：</p>

        <div class="q-card" id="boss-content"></div>

        <div class="progress-container"><div id="p-bar" class="progress-bar"></div></div>

        <p style="font-size:16px; color:#fff; margin-top:15px;">

            开启你的 2026 职场诊断

</div>

<script>
const dangerousAudio = document.getElementById('dangerousAudio');
function stopDangerousAudio() {
    dangerousAudio.pause();
    dangerousAudio.currentTime = 0;
}
let currentStep = 0;
let scores = { W: 0, M: 0, F: 0, S: 0 };
let historyStack = [];

const bgm = document.getElementById('bgm');
const musicBtn = document.getElementById('musicBtn');
let musicOn = false;

document.addEventListener('click', function initMusic() {
    if (!musicOn) {
        bgm.play().catch(()=>{});
        musicOn = true;
    }
    document.removeEventListener('click', initMusic);
});

function toggleMusic() {
    musicOn = !musicOn;
    if (musicOn) {
        bgm.muted = false;
        bgm.play().catch(()=>{});
        musicBtn.textContent = '🔇 关闭音乐';
    } else {
        bgm.pause();
        musicBtn.textContent = '🔊 开启音乐';
    }
}

function toBoss(step) {
    document.body.classList.remove('alert-bg');
    const pageHome = document.getElementById('page-home');
    const pageBoss = document.getElementById('page-boss');
    const content = document.getElementById('boss-content');
    
    pageHome.classList.add('hidden');
    pageBoss.classList.remove('hidden');

    const bossSteps = {
        1: { t: "灵魂拷问 01", q: "你要求员工把公司当作家，那你什么时候把他们当成家人，而不是工具？", a1: "家人也要为家做贡献，不干活算什么家人？", a2: "其实我也很纠结，我只是个夹心层..." },
        2: { t: "灵魂拷问 02", q: "你说要以结果为导向，那由于你决策失误造成的损失，你会按结果来承担吗？", a1: "我是老板，我承担的是倒闭的风险，这不够吗？", a2: "说得对，这题扎心了，我不是人。" },
        3: { t: "灵魂拷问 03", q: "你总说“公司不容易”，那我们打工人的生活、健康、家庭，就容易了吗？", a1: "成年人的世界没有容易二字，吃苦是福。", a2: "不容易，我不是人，退回到牛马界面。" },
        4: { t: "灵魂拷问 04", q: "你说“先做事、后谈钱”，那为什么你永远先拿钱，再跟我们谈做事？", a1: "没有我的资本运作，他们连加班的机会都没有。", a2: "别骂了别骂了，我知道错了。" },
        5: { t: "终极拷问", q: "你希望我们把工作当事业，那你什么时候把我们当合伙人，而不是打工人？", a1: "等公司上市了，自然会给你们画更大的饼。", a2: "我悔改，我骨子里也是个好人。" }
    };

    if (step <= 5) {
        const data = bossSteps[step];
        content.innerHTML = `
            <p style="color:var(--warning-red); font-weight:bold;">${data.t}</p>
            <h3 style="line-height:1.5;">${data.q}</h3>
            <button class="opt-btn" onclick="toBoss(${step + 1})">【继续】${data.a1}</button>
            <button class="opt-btn" style="color:#888" onclick="startQuiz()">【认怂】${data.a2}</button>
        `;
    } else {
        dangerousAudio.pause();
        dangerousAudio.currentTime = 0;
        dangerousAudio.play();
        document.body.classList.add('alert-bg');
        content.innerHTML = `
            <h1 style="font-size:60px; margin:0;">🚫</h1>
            <h2 style="color:var(--warning-red)">诊断终止：检测到非人类意识</h2>
            <p style="text-align:left; line-height:1.8; color:#ccc;">
                鉴于你极其稳固的<strong>资本家思维</strong>，本系统的算法已无法对其进行精神扫描。
                <br><br>
                在这里，你得不到任何“奉献”和“担当”的赞美。<br>
                <strong>请立刻面壁三分钟</strong>，反思为什么你的员工在提起你时，只有沉默。
            </p>
            <button class="role-btn btn-cow" style="width:100%; margin-top:20px;" onclick="stopDangerousAudio(); location.reload()">我悔改，重新做人</button>
        `;
    }

function startQuiz() {
    document.body.classList.remove('alert-bg');
    document.getElementById('page-home').classList.add('hidden');
    document.getElementById('page-boss').classList.add('hidden');
    document.getElementById('page-quiz').classList.remove('hidden');
    currentStep = 0;
    scores = { W: 0, M: 0, F: 0, S: 0 };
    historyStack = [];
    renderNext();
}

function renderNext() {
    if (currentStep >= questions.length) { showResult(); return; }
    const progress = (currentStep / questions.length) * 100;
    document.getElementById('p-bar').style.width = progress + '%';
    const q = questions[currentStep];
    let html = `<div class="q-card"><p style="color:var(--neon-green)">Question ${currentStep + 1}</p><h3>${q.q}</h3>`;
    q.options.forEach((opt, i) => { 
        html += `<button class="opt-btn" onclick="handleChoice(${i})">${String.fromCharCode(65+i)}. ${opt.t}</button>`; 
    });
    html += `</div>`;
    document.getElementById('quiz-content').innerHTML = html;
}

function handleChoice(i) {
    document.getElementById('clickAudio').play().catch(()=>{});
    historyStack.push({step: currentStep, score: {...scores}});
    const w = questions[currentStep].options[i].w;
    for (let k in w) scores[k] += w[k];
    currentStep++;
    renderNext();
}

function goPrev() {
    if (historyStack.length === 0) return;
    const last = historyStack.pop();
    currentStep = last.step;
    scores = last.score;
    renderNext();
}

function loadImage(src) {
    return new Promise((resolve) => {
        const img = new Image();
        img.crossOrigin = "Anonymous"; 
        img.onload = () => resolve(img);
        img.onerror = () => resolve(null); 
        img.src = src;
    });
}

async function showResult() {
    document.getElementById('resultAudio').play().catch(()=>{});
    document.getElementById('page-quiz').classList.add('hidden');
    document.getElementById('page-result').classList.remove('hidden');

    const sorted = Object.keys(scores).sort((a,b)=>scores[b]-scores[a]);
    const key = sorted[0] + sorted[1];
    const res = map[key] || map.SW;

    await generateFinalImage(res.title, res.desc, res.advice);
    document.getElementById('loading-text').innerText = "诊断完成！";
}

async function generateFinalImage(title, desc, adv) {
    const canvas = document.getElementById('resCanvas');
    const ctx = canvas.getContext('2d');
    const s = 2; 
    canvas.width = 400 * s;
    canvas.height = 700 * s; 
    ctx.scale(s, s);

    ctx.fillStyle = "#f4f1ea";
    ctx.fillRect(0, 0, 400, 700);
    ctx.strokeStyle = "#8b7e66";
    ctx.lineWidth = 1;
    ctx.strokeRect(10, 10, 380, 680);

    ctx.fillStyle = "#333";
    ctx.textAlign = "center";
    ctx.font = "bold 20px Arial";
    ctx.fillText("2026 职场精神状态扫描报告", 200, 60);
    ctx.font = "12px Arial";
    ctx.fillText("NO. " + Math.random().toString().slice(2, 10), 200, 85);

    ctx.fillStyle = "#d32f2f"; 
    ctx.font = "bold 32px sans-serif";
    ctx.fillText(title, 200, 160);

    ctx.fillStyle = "#555";
    ctx.font = "bold 15px sans-serif";
    ctx.fillText("【 临床表现 】", 200, 210);
    ctx.font = "14px sans-serif";
    ctx.fillText(desc, 200, 240);

    ctx.textAlign = "left";
    ctx.fillStyle = "#333";
    ctx.font = "bold 15px sans-serif";
    ctx.fillText("【 医生建议 】", 40, 310);
    ctx.font = "13px sans-serif";
    adv.forEach((text, i) => {
        ctx.fillText("· " + text, 40, 345 + (i * 28));
    });

    const [qrImg, sealImg] = await Promise.all([
        loadImage('qrcode.jpg'),
        loadImage('lx.png')
    ]);

    if (qrImg) {
        ctx.drawImage(qrImg, 150, 460, 100, 100);
    } else {
        ctx.strokeStyle = "#ccc";
        ctx.strokeRect(150, 460, 100, 100);
        ctx.fillStyle = "#999";
        ctx.font = "10px Arial";
        ctx.textAlign = "center";
        ctx.fillText("此处为二维码", 200, 515);
    }

    if (sealImg) {
        ctx.drawImage(sealImg, 270, 460, 90, 90);
    } else {
        ctx.save();
        ctx.translate(315, 505);
        ctx.rotate(-0.2);
        ctx.strokeStyle = "rgba(211,47,47,0.7)";
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.restore();
    }

    ctx.textAlign = "center";
    ctx.fillStyle = "#d32f2f";
    ctx.font = "bold 16px sans-serif";
    ctx.fillText("看看你的朋友，是什么货色 😏", 200, 600);

    ctx.fillStyle = "#666";
    ctx.font = "12px sans-serif";
    ctx.fillText("关注公号【灵犀测评局】", 200, 630);
    ctx.fillText("扫码回复 [不干了] 开启诊断", 200, 650);
    ctx.font = "10px Arial";
    ctx.fillText("© 2026 灵犀测评局", 200, 675);

    document.getElementById('share-img').src = canvas.toDataURL("image/png");
}
